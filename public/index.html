<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>多人連線貪吃蛇</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #2c3e50; font-family: sans-serif; overflow: hidden; }
        canvas { background: #1a252f; cursor: crosshair; }
        
        #scoreBoard { position: absolute; top: 20px; right: 20px; color: #ecf0f1; font-size: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); z-index: 5; pointer-events: none; }
        #instructions { position: absolute; bottom: 20px; color: #ecf0f1; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 5px; pointer-events: none; }
        
        #ui { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.7); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: white; text-shadow: 2px 2px 5px rgba(0,0,0,0.8); z-index: 10; cursor: pointer;
        }
        #ui.hidden { display: none; }
        #msg { font-size: 48px; margin-bottom: 10px; }
        #lastScore { font-size: 24px; color: #f1c40f; margin-bottom: 20px; }
        .blink { animation: blinker 1.5s linear infinite; font-size: 18px; color: #bdc3c7; }
        
        /* 皮膚按鈕的樣式 */
        #skinBtn {
            margin-top: 30px;
            padding: 10px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            background: #2ecc71;
            color: white;
            border: 3px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        #skinBtn:active { transform: scale(0.95); }

        @keyframes blinker { 50% { opacity: 0; } }
        /* 切換模式按鈕樣式 */
        .switch-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            background: #e67e22; /* 橘色醒目背景 */
            color: white;
            text-decoration: none;
            border: 2px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.2s, background 0.2s;
            z-index: 100;
        }
        .switch-btn:hover {
            background: #d35400;
            transform: scale(1.05);
        }
        .switch-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div id="scoreBoard">分數: 0</div>
    <div id="instructions">移動滑鼠轉向 | 按住滑鼠左鍵加速 (會消耗長度)</div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div id="ui">
        <h1 id="msg">多人連線貪吃蛇</h1>
        <h2 id="lastScore" class="hidden">上一局分數: 0</h2>
        <p class="blink">點擊畫面任意處開始戰鬥</p>
        
        <button id="skinBtn">更換皮膚</button>
        
        <a href="/index2.html" class="switch-btn" id="toOfflineBtn">前往離線練習區 ➔</a>
    </div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");
const msg = document.getElementById("msg");
const lastScoreDisplay = document.getElementById("lastScore");
const scoreBoard = document.getElementById("scoreBoard");
const skinBtn = document.getElementById("skinBtn");

const WORLD_RADIUS = 3000;
const WORLD_CENTER = { x: 3000, y: 3000 };
// 皮膚系統變數
const skins = ["#2ecc71", "#e74c3c", "#f1c40f", "#9b59b6", "#e67e22", "#1abc9c", "#ff9ff3", "#00d2d3", "#ecf0f1"];
let currentSkinIdx = 0;
let myColor = skins[currentSkinIdx];
let snake = [];
let foods = {}; 
let score = 0;
let snakeSpeed = 3; 
let myWidth = 15; 
let pendingGrowth = 0; 
let pendingShrink = 0; // 新增：用來累計要扣除的長度
let gameState = "MENU";
let mouse = { x: 400, y: 300 };
let isBoosting = false;
let targetEnemies = {};
let enemies = {};
let enemyWidths = {}; 
let enemyColors = {}; // 紀錄敵人的顏色

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// --- 皮膚切換按鈕事件 ---
skinBtn.addEventListener("mousedown", (e) => {
    e.stopPropagation(); // 防止點擊按鈕時觸發背後的 ui 進入遊戲
    currentSkinIdx = (currentSkinIdx + 1) % skins.length;
    myColor = skins[currentSkinIdx];
    skinBtn.style.background = myColor;
});
// --- 阻止點擊跳轉按鈕時觸發遊戲開始 ---
document.getElementById("toOfflineBtn").addEventListener("mousedown", (e) => {
    e.stopPropagation();
});
// --- 監聽事件 ---
socket.on('initFoods', (serverFoods) => foods = serverFoods);
socket.on('foodEaten', (data) => {
    delete foods[data.eatenId]; 
    foods[data.newFood.id] = data.newFood; 
});
socket.on('foodsDropped', (droppedFoods) => {
    Object.assign(foods, droppedFoods); 
});

socket.on('enemyUpdate', (data) => {
    targetEnemies[data.id] = data.snake;
    enemyWidths[data.id] = data.width; 
    enemyColors[data.id] = data.color; // 接收敵人的顏色
});

socket.on('die', (finalScore) => gameOver(finalScore));

socket.on('scoreUpdate', (data) => {
    if (data.id === socket.id) {
        let scoreDiff = data.score - score;
        
        // 判斷是得分還是扣分
        if (scoreDiff > 0) {
            pendingGrowth += Math.floor(scoreDiff / 3); // 吃東西長度增加
        } else if (scoreDiff < 0) {
            pendingShrink += Math.abs(scoreDiff); // 加速扣分累計
        }
        
        score = data.score;
        myWidth = data.width; 
        scoreBoard.innerText = `分數: ${score}`;
    }
});

socket.on('playerDisconnected', (id) => {
    delete targetEnemies[id];
    delete enemies[id];
    delete enemyWidths[id];
    delete enemyColors[id];
});

// --- 控制邏輯 ---
ui.addEventListener("mousedown", () => {
    if (gameState !== "PLAYING") init();
});
canvas.addEventListener("mousedown", () => isBoosting = true);
canvas.addEventListener("mouseup", () => isBoosting = false);
canvas.addEventListener("mousemove", (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

// 初始化/重生邏輯
function init() {
    snake = [];
    const startX = WORLD_CENTER.x + ((Math.random() * 2 - 1) * 2000);
    const startY = WORLD_CENTER.y + ((Math.random() * 2 - 1) * 2000);
    for(let i=0; i<20; i++) snake.push({ x: startX, y: startY }); 
    
    score = 0;
    myWidth = 15; 
    pendingGrowth = 0; 
    pendingShrink = 0;
    scoreBoard.innerText = `分數: ${score}`;
    gameState = "PLAYING";
    ui.classList.add("hidden"); 
}

function update() {
    if (gameState !== "PLAYING") return;

    let head = { ...snake[0] };
    let dx = mouse.x - (canvas.width / 2);
    let dy = mouse.y - (canvas.height / 2);
    let distance = Math.sqrt(dx * dx + dy * dy);

    let currentMoveSpeed = (isBoosting && snake.length > 20) ? snakeSpeed * 1.5 : snakeSpeed;

    if (distance > 5) {
        head.x += (dx / distance) * currentMoveSpeed;
        head.y += (dy / distance) * currentMoveSpeed;
    }

    snake.unshift(head);
    
    // 長度增長控制
    if (pendingGrowth > 0) {
        pendingGrowth--; // 不移除尾巴，蛇變長
    } else {
        snake.pop(); // 正常移動，移除尾巴
    }

    // 處理加速扣分導致的縮短：每累計 3 分就縮短 1 節
    while (pendingShrink >= 3) {
        pendingShrink -= 3;
        if (snake.length > 20) {
            snake.pop(); // 額外移除尾巴，蛇變短
        }
    }

    // 把自己的座標與目前的顏色傳給伺服器
    socket.emit('updatePos', { snake: snake, isBoosting: isBoosting, color: myColor });
}

function gameOver(finalScore) {
    gameState = "GAMEOVER";
    ui.classList.remove("hidden"); 
    msg.innerText = "你撞毀了！";
    // 顯示最後伺服器結算的分數 (如果為空則顯示本地 score)
    lastScoreDisplay.innerText = `上一局分數: ${finalScore !== undefined ? finalScore : score}`;
    lastScoreDisplay.classList.remove("hidden");
    snake = [];
}

// --- 繪製 ---
function drawMinimap() {
    const size = 150; 
    const padding = 20;
    const mapX = canvas.width - size - padding;
    const mapY = canvas.height - size - padding;
    
    ctx.beginPath();
    ctx.arc(mapX + size/2, mapY + size/2, size/2, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
    ctx.fill();
    ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
    ctx.stroke();

    const scale = size / (WORLD_RADIUS * 2);

    ctx.fillStyle = myColor; // 小地圖顯示自己的顏色
    if(snake[0]) ctx.fillRect(mapX + snake[0].x * scale, mapY + snake[0].y * scale, 4, 4);
    
    for(let id in targetEnemies) {
        let e = targetEnemies[id];
        ctx.fillStyle = enemyColors[id] || "gray"; // 小地圖顯示敵人顏色
        if(e && e[0]) ctx.fillRect(mapX + e[0].x * scale, mapY + e[0].y * scale, 4, 4);
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (gameState === "PLAYING" || gameState === "GAMEOVER") {
        const head = snake[0] || WORLD_CENTER;
        ctx.save();
        
        // 【修正 5】動態視野 (Zoom)：計算縮放比例，分數越高/寬度越寬，畫面就越縮小
        // 基礎寬度為 15。如果 myWidth 變成 30，targetZoom 就會是 0.5 (視野變廣一倍)
        let targetZoom = 15 / myWidth; 
        targetZoom = Math.max(0.3, targetZoom); // 限制最遠只能縮小到 0.3 倍，避免太遠

        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.scale(targetZoom, targetZoom); // 套用縮放
        ctx.translate(-head.x, -head.y);

        // ... 畫世界邊界和網格的程式碼保留不變 ...

        // 畫食物... (保留不變)

        // 【修正 1】畫敵人的蛇 (修復敵人長度不完整的問題)
        for (let id in targetEnemies) {
            if (!enemies[id]) {
                enemies[id] = JSON.parse(JSON.stringify(targetEnemies[id]));
            } else {
                // 同步長度：如果敵人變長了，把缺少的節點補上；如果變短了，直接截斷
                if (enemies[id].length < targetEnemies[id].length) {
                    for (let i = enemies[id].length; i < targetEnemies[id].length; i++) {
                        enemies[id].push({ ...targetEnemies[id][i] });
                    }
                } else if (enemies[id].length > targetEnemies[id].length) {
                    enemies[id].length = targetEnemies[id].length;
                }
            }

            // 平滑補間動畫
            for (let i = 0; i < targetEnemies[id].length; i++) {
                if (!enemies[id][i]) continue;
                enemies[id][i].x += (targetEnemies[id][i].x - enemies[id][i].x) * 0.15;
                enemies[id][i].y += (targetEnemies[id][i].y - enemies[id][i].y) * 0.15;
            }
            
            ctx.strokeStyle = enemyColors[id] || "#95a5a6"; 
            ctx.lineWidth = enemyWidths[id] || 15; 
            ctx.lineCap = "round"; ctx.lineJoin = "round";
            ctx.beginPath();
            ctx.moveTo(enemies[id][0].x, enemies[id][0].y);
            enemies[id].forEach(seg => ctx.lineTo(seg.x, seg.y)); ctx.stroke();
        }

        // ... 畫自己的蛇的程式碼保留不變 ...

        ctx.restore();
        drawMinimap(); // 小地圖不受縮放影響，放在 restore 之後繪製
    }

    requestAnimationFrame(() => { update(); draw(); });
}
draw();
</script>
</body>
</html>
