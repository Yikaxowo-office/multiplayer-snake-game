<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>多人連線貪吃蛇 - 終極版</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #2c3e50; font-family: sans-serif; overflow: hidden; }
        canvas { background: #ecf0f1; border: 5px solid #34495e; cursor: crosshair; }
        #ui { position: absolute; text-align: center; color: white; pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .hidden { display: none; }
        #instructions { position: absolute; bottom: 20px; color: #ecf0f1; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div id="ui">
        <h1 id="msg">點擊加入戰場</h1>
        <p id="scoreLabel">分數: 0 | 速度: 3.0</p>
    </div>

    <div id="instructions">移動滑鼠轉向 | 按住滑鼠左鍵加速 (會消耗長度)</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const msg = document.getElementById("msg");
const scoreLabel = document.getElementById("scoreLabel");

const WORLD_SIZE = 3000;
let snake = [];
let food = { x: -100, y: -100 };
let score = 0;
let snakeSpeed = 3;
let gameState = "MENU";
let mouse = { x: 400, y: 300 };
let isBoosting = false; // 是否正在加速

let targetEnemies = {};
let enemies = {};

// --- 監聽事件 ---
socket.on('foodUpdate', (f) => food = f);
socket.on('enemyUpdate', (data) => targetEnemies[data.id] = data.snake);
socket.on('die', () => gameOver());
socket.on('scoreUpdate', (data) => {
    if (data.id === socket.id) {
        score = data.score;
        snakeSpeed = data.speed;
    }
});

// --- 控制與加速邏輯 ---
canvas.addEventListener("mousedown", () => {
    if (gameState !== "PLAYING") init();
    else isBoosting = true;
});
canvas.addEventListener("mouseup", () => isBoosting = false);
canvas.addEventListener("mousemove", (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});

function init() {
    snake = [];
    const startX = Math.random() * (WORLD_SIZE - 200) + 100;
    const startY = Math.random() * (WORLD_SIZE - 200) + 100;
    for(let i=0; i<20; i++) snake.push({ x: startX, y: startY });
    score = 0;
    gameState = "PLAYING";
    msg.classList.add("hidden");
}

function update() {
    if (gameState !== "PLAYING") return;

    let head = { ...snake[0] };
    let dx = mouse.x - (canvas.width / 2);
    let dy = mouse.y - (canvas.height / 2);
    let distance = Math.sqrt(dx * dx + dy * dy);

    // 計算當前速度 (加速時變 1.8 倍)
    let currentMoveSpeed = isBoosting && snake.length > 10 ? snakeSpeed * 1.8 : snakeSpeed;

    if (distance > 5) {
        head.x += (dx / distance) * currentMoveSpeed;
        head.y += (dy / distance) * currentMoveSpeed;
    }

    if (head.x < 0 || head.x > WORLD_SIZE || head.y < 0 || head.y > WORLD_SIZE) gameOver();

    snake.unshift(head);
    
    // 加速消耗邏輯：加速時不 pop 尾巴的頻率變低，或直接 pop 兩次
    if (isBoosting && snake.length > 10) {
        snake.pop(); 
        snake.pop(); // 加速時尾巴掉得更快
    } else {
        snake.pop();
    }

    scoreLabel.innerText = `分數: ${score} | 速度: ${currentMoveSpeed.toFixed(1)}`;
    socket.emit('updatePos', { snake: snake, isBoosting: isBoosting });
}

function gameOver() {
    gameState = "GAMEOVER";
    msg.innerText = "遊戲結束！點擊重新開始";
    msg.classList.remove("hidden");
}

// --- 繪製小地圖 ---
function drawMinimap() {
    const size = 150; // 小地圖大小
    const padding = 20;
    ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
    ctx.fillRect(canvas.width - size - padding, canvas.height - size - padding, size, size);
    ctx.strokeStyle = "white";
    ctx.strokeRect(canvas.width - size - padding, canvas.height - size - padding, size, size);

    const scale = size / WORLD_SIZE;

    // 畫食物
    ctx.fillStyle = "red";
    ctx.fillRect(canvas.width - size - padding + food.x * scale, canvas.height - size - padding + food.y * scale, 3, 3);

    // 畫自己
    ctx.fillStyle = "#2ecc71";
    if(snake[0]) ctx.fillRect(canvas.width - size - padding + snake[0].x * scale, canvas.height - size - padding + snake[0].y * scale, 4, 4);
    
    // 畫敵人
    ctx.fillStyle = "gray";
    for(let id in targetEnemies) {
        let e = targetEnemies[id];
        if(e && e[0]) ctx.fillRect(canvas.width - size - padding + e[0].x * scale, canvas.height - size - padding + e[0].y * scale, 3, 3);
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (gameState === "PLAYING" || gameState === "GAMEOVER") {
        const head = snake[0] || { x: 0, y: 0 };
        ctx.save();
        ctx.translate(canvas.width / 2 - head.x, canvas.height / 2 - head.y);

        // 畫邊界與網格
        ctx.strokeStyle = "#34495e"; ctx.lineWidth = 10; ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);
        ctx.strokeStyle = "#dfe6e9"; ctx.lineWidth = 1;
        for(let i=0; i<=WORLD_SIZE; i+=200) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, WORLD_SIZE); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(WORLD_SIZE, i); ctx.stroke();
        }

        // 畫食物與敵人 (邏輯同前一版本)
        ctx.fillStyle = "#e74c3c"; ctx.beginPath(); ctx.arc(food.x, food.y, 12, 0, Math.PI * 2); ctx.fill();

        for (let id in targetEnemies) {
            if (!enemies[id]) enemies[id] = JSON.parse(JSON.stringify(targetEnemies[id]));
            for (let i = 0; i < targetEnemies[id].length; i++) {
                if (!enemies[id][i]) continue;
                enemies[id][i].x += (targetEnemies[id][i].x - enemies[id][i].x) * 0.15;
                enemies[id][i].y += (targetEnemies[id][i].y - enemies[id][i].y) * 0.15;
            }
            ctx.strokeStyle = "#95a5a6"; ctx.lineWidth = 15; ctx.beginPath();
            ctx.moveTo(enemies[id][0].x, enemies[id][0].y);
            enemies[id].forEach(seg => ctx.lineTo(seg.x, seg.y)); ctx.stroke();
        }

        // 畫自己
        ctx.strokeStyle = isBoosting ? "#3498db" : "#2ecc71"; // 加速時變色
        ctx.lineWidth = 15; ctx.lineCap = "round"; ctx.beginPath();
        if(snake[0]) {
            ctx.moveTo(snake[0].x, snake[0].y);
            snake.forEach(seg => ctx.lineTo(seg.x, seg.y));
            ctx.stroke();
        }

        ctx.restore();
        
        // 畫小地圖 (不隨攝影機移動)
        drawMinimap();
    }

    requestAnimationFrame(() => { update(); draw(); });
}
draw();
</script>
</body>
</html>
